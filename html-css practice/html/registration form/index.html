<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <header>
        <h1>Register for Our Service</h1>
        <p>Please fill out the form below to create an account.</p>
    </header>
    <main>
        <form action="/submit_registration" method="POST">
            <fieldset>
                <legend>Personal Information</legend>
                <label for="first_name">First Name:</label>
                <input type="text" id="first_name" name="first_name" required><br><br>

                <label for="last_name">Last Name:</label>
                <input type="text" id="last_name" name="last_name" required><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" minlength="6" maxlength="10" required><br><br>

                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="6" maxlength="10" required><br><br>
            </fieldset>

            <fieldset>
                <legend>Preferences</legend>
                <label for="newsletter">Subscribe to newsletter:</label>
                <input type="checkbox" id="newsletter" name="newsletter"><br><br>

                <label for="terms">I agree to the terms and conditions:</label>
                <input type="checkbox" id="terms" name="terms" required><br><br>
            </fieldset>

            <button type="submit">Register</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Our Service. All rights reserved.</p>
    </footer>
</body>
</html>
